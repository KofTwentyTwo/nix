# sops configuration
# ==================
# Maps age public keys to encrypted files.
# Each machine that needs to decrypt secrets must have its age key listed here.
#
# To add a new machine:
#   1. Generate key: age-keygen -o ~/.config/sops/age/keys.txt
#   2. Add public key below
#   3. Re-encrypt: sops updatekeys secrets/aws-credentials.enc

keys:
  - &darth age17x3xfs46rcxvlu0a6pv3kjnhx8qsakl5w92s6x3kt9s5kpa9cpls37lxs8
  - &dark_horse age1txsv7msn8ydlwr5nwhn3vw6cqjf6kezwjxtrjphzmfmn9pdgly5qsf0m5u
  - &grogu age1vt8rn4ndve3qhjejv8zqadv9q5lt0hur0ql50xpeguggau4vr37srmluug
  # Linux/WSL standalone Home Manager host (hostname: lore)
  - &lore age1fghe7s6auqfgya2w895eyyhr36rzj3yksw3d6qa0nqpn9rr8defqhsg3hm
  # FLEET key — shared identity for all of James's machines; master copy in
  # 1Password ("age fleet key (sops)"). New-machine bootstrap = paste this
  # identity into ~/.config/sops/age/keys.txt. No per-machine updatekeys
  # ceremony needed anymore. Revoking a machine = rotate this key + one
  # updatekeys pass. Per-machine keys above remain as extra recipients.
  - &fleet age1zd7vug4j3ffm4psyuh98vfftp60cuwmdfj5tchs55hh0fwjzvg2qh953mg

creation_rules:
  # Tailscale reusable auth key — decryptable by the Linux/WSL host(s) that
  # join the tailnet, plus the Macs so any host can rotate it. Add a new
  # Linux box's anchor here, then `sops updatekeys secrets/tailscale-authkey.enc`.
  - path_regex: secrets/tailscale-authkey\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/aws-credentials\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
  - path_regex: secrets/github-security-pat\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/github-sandbox-pat\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/jira-api-token\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/confluence-api-token\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/circleci-token\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  # Personal GitHub classic PAT (1Password "GITHUB_TOKEN" in
  # NixEnvironmentVariables is the master copy; no expiration). Consumed as
  # GITHUB_TOKEN by zsh so gh + git-over-HTTPS work without gh auth login.
  - path_regex: secrets/github-token\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  # OpenRouter API key (1Password "OpenRouter" in the greatergoods account is
  # the master copy). Consumed as OPENROUTER_API_KEY by zsh for hermes et al.
  - path_regex: secrets/openrouter-api-key\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  # Shared Firecrawl subscription key. The stdio MCP server reads this only
  # from process environment on Hermes, Claude Code, and Codex.
  - path_regex: secrets/firecrawl-api-key\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  # Grogu alone owns the continuous Slack gateway, so its bot and app tokens
  # are decryptable only there. Google OAuth refresh tokens remain
  # machine-local, while the Desktop OAuth client definition bootstraps each
  # machine.
  - path_regex: secrets/hermes-slack-(bot|app)-token\.enc$
    key_groups:
      - age:
          - *grogu
  - path_regex: secrets/hermes-google-client-secret\.enc$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *darth
          - *dark_horse
          - *grogu
          - *lore
          - *fleet
