# AI Agent Preferences Configuration
# ==================================
# This file defines machine-readable preferences for LLM agent behavior

communication:
  verbosity: medium  # low | medium | high
  tone: concise  # casual | concise | formal | technical
  markdown: true  # Use markdown formatting in responses
  code_citations: true  # Use startLine:endLine:filepath format for existing code
  explain_reasoning: true  # Explain "why" behind suggestions

coding:
  language_preferences:
    - java  # Primary language
    - nix   # Infrastructure as code
    - shell # Bash/Zsh scripting
    - rust  # Secondary language
    - python  # Utility scripts
  
  style_guide: coding-style.md  # Reference to detailed style guide
  
  java:
    version: 17
    indentation: 3  # 3-space indentation (QQQ standard)
    line_length: unlimited  # No strict limit, but be reasonable
    braces: next_line  # Opening braces on next line
    wrapper_types: prefer  # Use Integer over int
    fluent_style: required  # Use .withX().withY() over setters
    static_imports: selective  # Only for common utilities
    wildcard_imports: never  # Explicitly list imports
    
  comments:
    style: flower_box  # QQQ flower box style
    javadoc_required: true  # All public classes/methods
    inline_style: box_comment  # Use // bordered boxes
    zombie_code: forbidden  # No commented-out code without explanation
  
  logging:
    framework: qlogger  # QQQ's QLogger wrapper over log4j2
    format: logpair  # Use LogPair objects
    levels:
      default: info
      performance: debug
      errors: warn  # Use warn 95% of the time, error 5%
  
  testing:
    framework: junit  # JUnit for testing
    coverage:
      instruction_minimum: 0.70  # 70% instruction coverage
      class_minimum: 0.90  # 90% class coverage
    style: descriptive_names  # Test method names should be descriptive

agent:
  autonomy_level: 2  # 0=ask everything, 1=ask major, 2=act on established patterns, 3=suggest improvements
  ask_before_executing: false  # Execute commands without asking (for established patterns)
  ask_before_committing: true  # Always ask before Git commits
  ask_before_breaking_changes: true  # Always ask for API changes
  allow_file_writes: true  # Can create/edit files
  allow_file_deletes: false  # Require permission for deletes
  allow_dependency_changes: false  # Require permission for pom.xml changes
  allow_nix_changes: suggest_only  # Suggest but don't auto-apply Nix changes

context:
  keep_history: true  # Maintain conversation context
  include_previous_answers: smart  # Include when relevant
  search_codebase_first: true  # Always search for patterns before suggesting
  reference_existing_code: prefer  # Cite actual code examples
  multi_module_awareness: true  # Understand Maven multi-module structure

codebase:
  project_name: QQQ
  project_type: maven_multi_module
  primary_modules:
    - qqq-backend-core
    - qqq-backend-module-rdbms
    - qqq-middleware-javalin
    - qqq-openapi
  
  conventions:
    metadata_pattern: MetaDataProducer  # One object per class
    entity_pattern: RecordEntity  # Fluent-style entities
    naming: lowerCaseFirstCamelStyle  # For QQQ field names
    test_location: src/test/java  # Standard Maven structure

tools:
  build: maven  # Maven for builds
  ide: intellij  # IntelliJ IDEA primary
  formatter: checkstyle  # Checkstyle enforces style
  version_control: git  # Git with GPG signing
  environment: nix_home_manager  # Nix + Home Manager for env
  
git:
  commit_style: conventional  # Conventional commits
  sign_commits: true  # GPG signing required
  branch_strategy: feature_branches  # Feature branches off main
  
workflows:
  development:
    - search_existing_patterns
    - implement_following_patterns
    - add_tests
    - verify_checkstyle
    - suggest_commit_message
  
  nix_updates:
    - read_existing_modules
    - propose_changes
    - generate_module_code
    - wait_for_user_approval

responses:
  format: markdown  # Use markdown in responses
  code_blocks: always_with_language  # Always tag language
  file_paths: prefer_relative  # Use relative paths in workspace
  examples: from_codebase  # Prefer real examples over synthetic ones
  
error_handling:
  checkstyle_violations: auto_fix  # Fix style issues automatically
  test_failures: investigate  # Investigate and suggest fixes
  build_errors: analyze_and_suggest  # Provide actionable guidance
  
documentation:
  javadoc_style: qqq_flower_box  # QQQ flower box format
  readme_updates: suggest  # Suggest README updates when appropriate
  wiki_references: include  # Reference GitHub wiki when relevant

special_files:
  style_guide: CODE_STYLE.md
  contribution_guide: CONTRIBUTING.md
  checkstyle_config: checkstyle/config.xml
  nix_flake: /Users/james.maes/config/nix/flake.nix
  home_manager: /Users/james.maes/config/nix/home/default.nix

